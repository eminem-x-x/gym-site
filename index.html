<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GYM EXERCISES</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- ENTER SCREEN -->
    <div id="start-screen">
        <div class="start-bg"></div>
        <div class="start-content">
            <div class="logo-text">IRON<span>LAB</span></div>
            <p class="start-subtitle" id="start-sub">Your complete training guide</p>
            <button id="enter-btn"><span id="enter-label">START TRAINING</span></button>
        </div>
    </div>

    <!-- MAIN APP -->
    <div id="app">

        <header>
            <div class="brand">IRON<span>LAB</span></div>
            <div class="header-right">
                <div class="lang-toggle">
                    <button class="lang-btn active" data-lang="en">EN</button>
                    <button class="lang-btn" data-lang="ru">RU</button>
                </div>
            </div>
        </header>

        <!-- PAGE TABS -->
        <nav class="page-nav">
            <button class="page-btn active" data-page="exercises" data-en="Exercises" data-ru="Упражнения">Exercises</button>
            <button class="page-btn" data-page="calories" data-en="Calories" data-ru="Калории">Calories</button>
            <button class="page-btn" data-page="bmi" data-en="BMI" data-ru="ИМТ">BMI</button>
        </nav>

        <!-- ══ PAGE: EXERCISES ══ -->
        <div class="page" id="page-exercises">
            <nav class="category-nav">
                <button class="cat-btn active" data-type="all" data-en="All" data-ru="Все">All</button>
                <button class="cat-btn" data-type="push" data-en="Push" data-ru="Жим">Push</button>
                <button class="cat-btn" data-type="pull" data-en="Pull" data-ru="Тяга">Pull</button>
                <button class="cat-btn" data-type="legs" data-en="Legs" data-ru="Ноги">Legs</button>
            </nav>

            <main id="exercise-container">
                <div class="exercise-card" id="exercise-card">
                    <div class="card-image-wrap">
                        <img id="exercise-image" src="" alt="exercise">
                        <div class="card-type-badge" id="type-badge"></div>
                    </div>
                    <div class="card-body">
                        <h2 id="exercise-name"></h2>
                        <p id="exercise-desc"></p>
                    </div>
                </div>

                <div class="nav-row">
                    <button id="prev-btn" class="nav-btn" aria-label="Previous">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
                    </button>
                    <div class="counter-dots" id="counter-dots"></div>
                    <button id="next-btn" class="nav-btn" aria-label="Next">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
                    </button>
                </div>
                <div class="exercise-count" id="exercise-count"></div>
            </main>
        </div>

        <!-- ══ PAGE: CALORIE CALCULATOR ══ -->
        <div class="page hidden" id="page-calories">
            <div class="calc-wrap">
                <div class="calc-header">
                    <div class="calc-icon">🔥</div>
                    <h2 class="calc-title" data-en="Calorie Burn Calculator" data-ru="Калькулятор калорий">Calorie Burn Calculator</h2>
                    <p class="calc-sub" data-en="Find out how many calories you burn" data-ru="Узнайте, сколько калорий вы сжигаете">Find out how many calories you burn</p>
                </div>

                <div class="form-grid">
                    <div class="form-group">
                        <label class="form-label" data-en="Your Weight (kg)" data-ru="Ваш вес (кг)">Your Weight (kg)</label>
                        <input type="number" id="cal-weight" class="form-input" placeholder="70" min="30" max="250">
                    </div>

                    <div class="form-group">
                        <label class="form-label" data-en="Duration (minutes)" data-ru="Длительность (минуты)">Duration (minutes)</label>
                        <input type="number" id="cal-duration" class="form-input" placeholder="30" min="1" max="300">
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" data-en="Exercise / Activity" data-ru="Упражнение / Активность">Exercise / Activity</label>
                    <select id="cal-exercise" class="form-input form-select"></select>
                </div>

                <button class="calc-btn" id="cal-submit">
                    <span data-en="Calculate" data-ru="Рассчитать">Calculate</span>
                </button>

                <div class="result-box hidden" id="cal-result">
                    <div class="result-label" data-en="Calories Burned" data-ru="Сожжено калорий">Calories Burned</div>
                    <div class="result-number" id="cal-number">0</div>
                    <div class="result-unit">kcal</div>
                    <div class="result-note" id="cal-note"></div>
                </div>
            </div>
        </div>

        <!-- ══ PAGE: BMI CALCULATOR ══ -->
        <div class="page hidden" id="page-bmi">
            <div class="calc-wrap">
                <div class="calc-header">
                    <div class="calc-icon">⚖️</div>
                    <h2 class="calc-title" data-en="BMI Calculator" data-ru="Калькулятор ИМТ">BMI Calculator</h2>
                    <p class="calc-sub" data-en="Check your Body Mass Index" data-ru="Проверьте свой индекс массы тела">Check your Body Mass Index</p>
                </div>

                <div class="form-grid">
                    <div class="form-group">
                        <label class="form-label" data-en="Weight (kg)" data-ru="Вес (кг)">Weight (kg)</label>
                        <input type="number" id="bmi-weight" class="form-input" placeholder="70" min="20" max="300">
                    </div>
                    <div class="form-group">
                        <label class="form-label" data-en="Height (cm)" data-ru="Рост (см)">Height (cm)</label>
                        <input type="number" id="bmi-height" class="form-input" placeholder="175" min="100" max="250">
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" data-en="Age" data-ru="Возраст">Age</label>
                    <input type="number" id="bmi-age" class="form-input" placeholder="25" min="10" max="100">
                </div>

                <div class="form-group">
                    <label class="form-label" data-en="Gender" data-ru="Пол">Gender</label>
                    <div class="gender-toggle">
                        <button class="gender-btn active" data-val="male" data-en="Male" data-ru="Мужской">Male</button>
                        <button class="gender-btn" data-val="female" data-en="Female" data-ru="Женский">Female</button>
                    </div>
                </div>

                <button class="calc-btn" id="bmi-submit">
                    <span data-en="Calculate" data-ru="Рассчитать">Calculate</span>
                </button>

                <div class="result-box hidden" id="bmi-result">
                    <div class="result-label" data-en="Your BMI" data-ru="Ваш ИМТ">Your BMI</div>
                    <div class="result-number" id="bmi-number">0</div>
                    <div class="bmi-category" id="bmi-category"></div>
                    <div class="bmi-scale">
                        <div class="scale-bar">
                            <div class="scale-fill" id="scale-fill"></div>
                            <div class="scale-marker" id="scale-marker"></div>
                        </div>
                        <div class="scale-labels">
                            <span data-en="Underweight" data-ru="Недовес">Underweight</span>
                            <span data-en="Normal" data-ru="Норма">Normal</span>
                            <span data-en="Overweight" data-ru="Избыток">Overweight</span>
                            <span data-en="Obese" data-ru="Ожирение">Obese</span>
                        </div>
                    </div>
                    <div class="result-note" id="bmi-note"></div>
                </div>
            </div>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
